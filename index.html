<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #4f46e5, #2563eb);
      color: #ffffff;
    }
    .welcome-card {
      max-width: 420px;
      width: 100%;
      padding: 32px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.28);
      text-align: center;
      backdrop-filter: blur(14px);
    }
    .welcome-card h1 {
      margin: 0 0 16px;
      font-size: 32px;
      line-height: 1.1;
    }
    .welcome-card p {
      margin: 0 0 24px;
      font-size: 16px;
      color: #e0e7ff;
    }
    .welcome-card button {
      padding: 12px 20px;
      border: none;
      border-radius: 999px;
      font-size: 16px;
      background: #f8fafc;
      color: #1e293b;
      cursor: pointer;
    }
    .welcome-card button:hover {
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="welcome-card">
    <h1>Welcome!</h1>
    <p>You are now logged in. This is a second web page for your login demo.</p>
    <button onclick="location.href='index.html'">Back to Login</button>
  </div>
</body>
</html>
